<header class="header">
  <div class="header-inner">

    <!-- Logo -->
    <a class="logo" routerLink="/dashboard">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="10" fill="#6C63FF"/>
        <path d="M8 16C8 11.58 11.58 8 16 8s8 3.58 8 8-3.58 8-8 8"
              stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="3" fill="#fff"/>
      </svg>
      <span class="logo-name">Vaultz</span>
    </a>

    <!-- Nav central (desktop) -->
    <nav class="nav-links">
      <a routerLink="/dashboard"   routerLinkActive="active">Inicio</a>
      <a routerLink="/movements"   routerLinkActive="active">Movimientos</a>
      <a routerLink="/transfer"    routerLinkActive="active">Transferir</a>
      <a routerLink="/cards"       routerLinkActive="active">Tarjetas</a>
    </nav>

    <!-- Acciones derecha -->
    <div class="header-actions">

      <!-- Notificaciones -->
      <button class="icon-btn" aria-label="Notificaciones" (click)="toggleNotifications()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
        @if (notificationCount > 0) {
          <span class="badge">{{ notificationCount > 9 ? '9+' : notificationCount }}</span>
        }
      </button>

      <!-- Avatar / menú usuario -->
      <div class="user-menu" [class.open]="menuOpen" (clickOutside)="menuOpen = false">
        <button class="avatar-btn" (click)="toggleMenu()" aria-label="Menú usuario">
          <div class="avatar">
            <span>{{ userInitials }}</span>
          </div>
          <div class="user-info">
            <span class="user-name">{{ userName }}</span>
            <span class="user-email">{{ userEmail }}</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>

        @if (menuOpen) {
          <div class="dropdown">
            <a class="dropdown-item" routerLink="/profile" (click)="menuOpen = false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
              Mi perfil
            </a>
            <a class="dropdown-item" routerLink="/settings" (click)="menuOpen = false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
              </svg>
              Configuración
            </a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item logout" (click)="onLogout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Cerrar sesión
            </button>
          </div>
        }
      </div>

      <!-- Hamburger (mobile) -->
      <button class="hamburger" [class.active]="mobileOpen" (click)="toggleMobile()" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile nav -->
  @if (mobileOpen) {
    <nav class="mobile-nav">
      <a routerLink="/dashboard"  routerLinkActive="active" (click)="mobileOpen = false">Inicio</a>
      <a routerLink="/movements"  routerLinkActive="active" (click)="mobileOpen = false">Movimientos</a>
      <a routerLink="/transfer"   routerLinkActive="active" (click)="mobileOpen = false">Transferir</a>
      <a routerLink="/cards"      routerLinkActive="active" (click)="mobileOpen = false">Tarjetas</a>
      <div class="mobile-divider"></div>
      <a routerLink="/profile"    routerLinkActive="active" (click)="mobileOpen = false">Mi perfil</a>
      <a routerLink="/settings"   routerLinkActive="active" (click)="mobileOpen = false">Configuración</a>
      <button class="mobile-logout" (click)="onLogout()">Cerrar sesión</button>
    </nav>
  }
</header>

<router-outlet></router-outlet>
